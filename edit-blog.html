<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Edit Blog | BlogSphere</title>

    <!-- Google Font -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="css/style.css">

</head>

<body>

    <!-- ================= Sidebar ================= -->

    <aside class="sidebar">

        <div class="sidebar-logo">

            <h2>BlogSphere</h2>

        </div>

        <ul>

            <li>
                <a href="dashboard.html">
                    Dashboard
                </a>
            </li>

            <li>
                <a href="create-blog.html">
                    Create Blog
                </a>
            </li>

            <li>
                <a href="edit-blog.html"
                    class="active">
                    Edit Blog
                </a>
            </li>

            <li>
                <a href="index.html">
                    Home
                </a>
            </li>

            <li>
                <a href="#"
                    onclick="logout()">
                    Logout
                </a>
            </li>

        </ul>

    </aside>

    <!-- ================= Main Content ================= -->

    <main class="dashboard-content">

        <header class="dashboard-header">

            <div>

                <h1>Edit Blog</h1>

                <p>

                    Update your blog and publish the latest version.

                </p>

            </div>

        </header>

        <!-- ================= Edit Form ================= -->

        <section class="editor-container">

            <form id="editBlogForm">

                <!-- Title -->

                <div class="form-group">

                    <label>Blog Title</label>

                    <input
                        type="text"
                        id="title"
                        placeholder="Enter blog title"
                        required>

                </div>

                <!-- Category -->

                <div class="form-group">

                    <label>Category</label>

                    <select
                        id="category"
                        required>

                        <option value="">
                            Select Category
                        </option>

                        <option>Programming</option>
                        <option>Web Development</option>
                        <option>JavaScript</option>
                        <option>React</option>
                        <option>Node.js</option>
                        <option>MongoDB</option>
                        <option>AI</option>
                        <option>Career</option>

                    </select>

                </div>

                <!-- Image -->

                <div class="form-group">

                    <label>Cover Image URL</label>

                    <input
                        type="url"
                        id="image"
                        placeholder="https://example.com/image.jpg"
                        required>

                </div>

                <!-- Description -->

                <div class="form-group">

                    <label>Short Description</label>

                    <textarea
                        id="description"
                        rows="3"
                        maxlength="180"
                        placeholder="Write a short description..."
                        required></textarea>

                </div>

                <!-- Content -->

                <div class="form-group">

                    <label>Blog Content</label>

                    <textarea
                        id="content"
                        rows="15"
                        placeholder="Edit your blog..."
                        required></textarea>

                </div>

                <!-- Buttons -->

                <div class="button-group">

                    <button
                        type="submit"
                        class="btn">

                        Update Blog

                    </button>

                    <a
                        href="dashboard.html"
                        class="btn btn-secondary">

                        Cancel

                    </a>

                </div>

            </form>

        </section>

    </main>

    <script src="js/auth.js"></script>
    <script src="js/blog.js"></script>

    <script>

        checkLogin();

        // blog.js will automatically load
        // the selected blog into this form.

    </script>

    <script src="js/edit-blog.js"></script>

</body>

</html>
