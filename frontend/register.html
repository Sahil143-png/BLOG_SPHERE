<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | BlogSphere</title>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <header>

        <nav class="navbar">

            <div class="logo">

                <a href="index.html">BlogSphere</a>

            </div>

            <ul class="nav-links">

                <li><a href="index.html">Home</a></li>

                <li><a href="login.html">Login</a></li>

            </ul>

        </nav>

    </header>

    <!-- ================= REGISTER SECTION ================= -->

    <main class="auth-page">

        <div class="auth-container">

            <!-- Left Side -->

            <div class="auth-left">

                <h1>Join BlogSphere 🚀</h1>

                <p>

                    Create your free account and start writing
                    blogs, sharing knowledge, and connecting with
                    developers around the world.

                </p>

                <img src="images/register.svg"
                    alt="Register Illustration">

            </div>

            <!-- Right Side -->

            <div class="auth-right">

                <div class="auth-card">

                    <h2>Create Account</h2>

                    <p class="subtitle">

                        Fill in your details to get started.

                    </p>

                    <form id="registerForm">

                        <div class="form-group">

                            <label>Full Name</label>

                            <input
                                type="text"
                                id="username"
                                placeholder="Enter your full name"
                                required>

                        </div>

                        <div class="form-group">

                            <label>Email Address</label>

                            <input
                                type="email"
                                id="email"
                                placeholder="Enter your email"
                                required>

                        </div>

                        <div class="form-group">

                            <label>Password</label>

                            <input
                                type="password"
                                id="password"
                                placeholder="Create a password"
                                required>

                        </div>

                        <div class="form-group">

                            <label>Confirm Password</label>

                            <input
                                type="password"
                                id="confirmPassword"
                                placeholder="Confirm your password"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary full-width">

                            Create Account

                        </button>

                    </form>

                    <p class="auth-footer">

                        Already have an account?

                        <a href="login.html">

                            Login

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </main>

    <!-- ================= FOOTER ================= -->

    <footer>

        <p>

            © 2026 BlogSphere. All Rights Reserved.

        </p>

    </footer>

    <script src="js/auth.js"></script>

</body>

</html>
