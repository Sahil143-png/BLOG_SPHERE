<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | BlogSphere</title>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <header>

        <nav class="navbar">

            <div class="logo">

                <a href="index.html">BlogSphere</a>

            </div>

            <ul class="nav-links">

                <li><a href="index.html">Home</a></li>

                <li><a href="register.html">Register</a></li>

            </ul>

        </nav>

    </header>

    <!-- ================= LOGIN SECTION ================= -->

    <main class="auth-page">

        <div class="auth-container">

            <div class="auth-left">

                <h1>Welcome Back 👋</h1>

                <p>

                    Login to continue reading, writing,
                    and managing your blogs.

                </p>

                <img src="images/login.svg" alt="Login Illustration">

            </div>

            <div class="auth-right">

                <div class="auth-card">

                    <h2>Login</h2>

                    <p class="subtitle">

                        Sign in to your BlogSphere account

                    </p>

                    <form id="loginForm">

                        <div class="form-group">

                            <label>Email Address</label>

                            <input
                                type="email"
                                id="email"
                                placeholder="Enter your email"
                                required
                            >

                        </div>

                        <div class="form-group">

                            <label>Password</label>

                            <input
                                type="password"
                                id="password"
                                placeholder="Enter your password"
                                required
                            >

                        </div>

                        <div class="form-options">

                            <label>

                                <input type="checkbox">

                                Remember Me

                            </label>

                            <a href="#">

                                Forgot Password?

                            </a>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary full-width"
                        >

                            Login

                        </button>

                    </form>

                    <p class="auth-footer">

                        Don't have an account?

                        <a href="register.html">

                            Register

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </main>

    <!-- ================= FOOTER ================= -->

    <footer>

        <p>

            © 2026 BlogSphere. All Rights Reserved.

        </p>

    </footer>

    <script src="js/auth.js"></script>

</body>

</html>
